name: MeowNotes CI/CD

env:
  MODULE: app

on:
  push:
    branches:
      - 'main'
      - 'master'
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup env
        run: |
          echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*versionName = "\(.*\)"/\1/')
          echo "version=v$VERSION" >> $GITHUB_ENV
          echo "tag_name=v$VERSION" >> $GITHUB_ENV

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
          else
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)")
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: gradlew permissions
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: |
          APK_SRC=$(find ${{ env.MODULE }}/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_DST="${{ env.MODULE }}/build/outputs/apk/debug/MeowNotes-${{ env.version }}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "apk_path=$APK_DST" >> $GITHUB_ENV

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeowNotes-${{ env.version }}-${{ env.date_today }}
          path: ${{ env.apk_path }}
          retention-days: 30

      - name: Create tag
        run: |
          TAG="${{ env.tag_name }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$TAG$"; then
            echo "–¢–µ–≥ $TAG —É–∂–µ —Å—É—â–µ—Å—Ç–≤—É–µ—Ç, –ø—Ä–æ–ø—É—Å–∫–∞–µ–º"
          else
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "–¢–µ–≥ $TAG —Å–æ–∑–¥–∞–Ω"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.tag_name }}
          name: MeowNotes ${{ env.version }}
          draft: false
          prerelease: false
          body: |
            ## MeowNotes ${{ env.version }}
            ### Changes
            ${{ env.CHANGELOG }}
          files: ${{ env.apk_path }}
