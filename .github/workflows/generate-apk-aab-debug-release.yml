name: MeowNotes CI/CD

env:
  MODULE: app

on:
  push:
    branches:
      - 'release/**'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'MeowNotes'
        required: false
        default: ''

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup env
        run: |
          echo "date_today=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
            echo "is_tag=true" >> $GITHUB_ENV
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
            echo "is_tag=false" >> $GITHUB_ENV
          fi

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" -20)
          else
            CHANGELOG=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s (%h)")
          fi
          {
            echo "CHANGELOG<<EOF"
            echo "$CHANGELOG"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name:  gradlew
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
        
      - name: Rename APK
        run: |
          APK_SRC=$(find ${{ env.MODULE }}/build/outputs/apk/debug -name "*.apk" | head -1)
          APK_DST="${{ env.MODULE }}/build/outputs/apk/debug/MeowNotes-${{ env.version }}.apk"
          mv "$APK_SRC" "$APK_DST"
          echo "apk_path=$APK_DST" >> $GITHUB_ENV

      - name: Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeowNotes-${{ env.version }}-${{ env.date_today }}
          path: ${{ env.apk_path }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.is_tag == 'true' && env.version || format('build-{0}', github.run_number) }}
          name: ${{ inputs.release_name != '' && inputs.release_name || format('MeowNotes {0}', env.version) }}
          draft: false
          prerelease: ${{ env.is_tag != 'true' }}
          body: |
            ### Changes
            ${{ env.CHANGELOG }}
          files: ${{ env.apk_path }}
